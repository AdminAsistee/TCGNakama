<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport" />
    <title>TCG Nakama Marketplace</title>

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Buy and sell Pokemon, One Piece, and Yu-Gi-Oh! TCG cards at TCGNakama. The ultimate marketplace for collectors to find rare cards, compare market prices, and build their ultimate deck with secure shipping." />

    <!-- Open Graph for Discord/Twitter -->
    <meta property="og:title" content="TCG Nakama Marketplace" />
    <meta property="og:description"
        content="Buy and sell Pokemon, One Piece, and Yu-Gi-Oh! TCG cards at TCGNakama. The ultimate marketplace for collectors to find rare cards, compare market prices, and build their ultimate deck with secure shipping." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tcgnakama.com/" />
    <meta property="og:image" content="https://tcgnakama.com/static/favicon-512x512.png" />

    <!-- Submits Favicons for Google Search and Browser Tabs -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/static/live_logo.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon-512x512.png" />
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png" />

    <!-- Page-specific preload hints (LCP images, etc.) -->
    {% block preload_hints %}{% endblock %}

    <!-- HTMX (deferred — non-blocking) -->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.10/dist/htmx.min.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Vault Terminal: Base Initialization...");
            if (typeof htmx !== 'undefined') {
                console.log("HTMX Engine: ONLINE");
            } else {
                console.error("HTMX Engine: OFFLINE - Site interactivity will be disabled.");
            }
        });
    </script>

    <!-- Preconnect to critical third-party origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />

    <!-- Google Fonts — loaded async (non-blocking) via media="print" trick -->
    <!-- Space Grotesk: 2 weights only (was 5) -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" />
    <!-- Material Symbols: fixed axes + only 38 icons used in templates (was full 3.7MB variable font) -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add,add_shopping_cart,arrow_back,arrow_downward,arrow_upward,block,bolt,check_circle,chevron_left,chevron_right,close,credit_card,error,expand_more,grading,grid_view,home,image,info,local_shipping,monitoring,photo_camera,public,remove,search,search_off,share,shield,shopping_bag,shopping_cart,smart_display,storefront,sync,trending_up,tune,verified,warning,zoom_in&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet"
        media="print" onload="this.media='all'" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add,add_shopping_cart,arrow_back,arrow_downward,arrow_upward,block,bolt,check_circle,chevron_left,chevron_right,close,credit_card,error,expand_more,grading,grid_view,home,image,info,local_shipping,monitoring,photo_camera,public,remove,search,search_off,share,shield,shopping_bag,shopping_cart,smart_display,storefront,sync,trending_up,tune,verified,warning,zoom_in&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'" />

    <!-- Compiled Tailwind CSS (tree-shaken, minified — replaces 127KB CDN) -->
    <link rel="stylesheet" href="/static/tailwind.css" />
    <script>
        function updateQty(id, delta) {
            const el = document.getElementById(id);
            if (!el) return;
            let val = parseInt(el.innerText) + delta;
            if (val < 1) val = 1;
            el.innerText = val;
        }

        async function handleCartAction(variantId, action, event, qtySourceId) {
            if (event) event.preventDefault();
            if (event) event.stopPropagation();
            if (!variantId) return;

            const qty = qtySourceId ? (parseInt(document.getElementById(qtySourceId).innerText) || 1) : 1;
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;

            const cartCount = document.getElementById('cart-count');
            const cartCountMobile = document.getElementById('cart-count-mobile');
            let originalCount = 0;
            if (cartCount) {
                originalCount = parseInt(cartCount.innerText) || 0;
                cartCount.innerText = originalCount + qty;
                cartCount.classList.add('scale-125');
                setTimeout(() => cartCount.classList.remove('scale-125'), 500);
            }
            if (cartCountMobile) {
                cartCountMobile.innerText = originalCount + qty;
            }

            if (action === 'buy') {
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">sync</span>';
            }

            btn.classList.add('opacity-75', 'cursor-not-allowed', 'pointer-events-none');

            try {
                const response = await fetch(`/cart/add?variant_id=${encodeURIComponent(variantId)}&quantity=${qty}`, {
                    method: 'POST'
                });
                const data = await response.json();

                // --- INVENTORY GUARD: Handle 409 Sold Out ---
                if (response.status === 409) {
                    if (cartCount) cartCount.innerText = originalCount;
                    if (cartCountMobile) cartCountMobile.innerText = originalCount;

                    // Show sold-out toast
                    const toast = document.getElementById('toast');
                    const toastMsg = document.getElementById('toast-message');
                    if (toast && toastMsg) {
                        const toastIcon = toast.querySelector('.material-symbols-outlined');
                        if (toastIcon) { toastIcon.textContent = 'error'; toastIcon.className = 'material-symbols-outlined text-red-400 text-lg'; }
                        toastMsg.textContent = data.message || 'This item just sold out!';
                        toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
                        setTimeout(() => {
                            toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
                            if (toastIcon) { toastIcon.textContent = 'check_circle'; toastIcon.className = 'material-symbols-outlined text-neon-green text-lg'; }
                        }, 3000);
                    }

                    // If fully sold out, disable the button permanently
                    if (data.sold_out) {
                        btn.innerHTML = '<span class="material-symbols-outlined text-red-400">block</span> SOLD OUT';
                        btn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                        btn.classList.remove('bg-primary', 'hover:bg-yellow-300');
                        btn.classList.add('bg-gray-700/50', 'text-gray-400');
                    } else {
                        btn.innerHTML = '<span class="material-symbols-outlined text-neon-red">warning</span>';
                        setTimeout(() => {
                            btn.innerHTML = originalContent;
                            btn.classList.remove('opacity-75', 'cursor-not-allowed', 'pointer-events-none');
                        }, 2000);
                    }
                    return;
                }

                if (cartCount) cartCount.innerText = data.total_quantity;
                if (cartCountMobile) cartCountMobile.innerText = data.total_quantity;

                if (action === 'buy' && data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else if (action === 'add') {
                    btn.innerHTML = '<span class="material-symbols-outlined text-neon-green scale-125">check_circle</span>';
                    setTimeout(() => {
                        btn.innerHTML = originalContent;
                        btn.classList.remove('opacity-75', 'cursor-not-allowed', 'pointer-events-none');
                    }, 2000);
                }
            } catch (err) {
                console.error("Cart error:", err);
                if (cartCount) cartCount.innerText = originalCount;
                if (cartCountMobile) cartCountMobile.innerText = originalCount;
                btn.innerHTML = '<span class="material-symbols-outlined text-neon-red">error</span>';
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('opacity-75', 'cursor-not-allowed', 'pointer-events-none');
                }, 2000);
            }
        }
    </script>
</head>

<body class="bg-background-dark text-white min-h-screen relative overflow-x-hidden" id="top">
    {% block content %}{% endblock %}
</body>

</html>
