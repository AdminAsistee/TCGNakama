<!-- Standardized Admin/Seller Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 glass-panel border-t border-glass-border pb-safe pt-2 px-6 z-[60] rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.4)]">
    <div class="flex justify-between items-center h-16 max-w-4xl mx-auto px-2" id="bottom-nav-items">
        <!-- Main items injected here -->
    </div>
</nav>

<!-- Mobile More Menu Drawer -->
<div id="more-menu-drawer" class="fixed inset-0 z-[70] hidden transition-all duration-300">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="toggleMoreMenu()"></div>
    <div class="absolute bottom-0 left-0 right-0 glass-panel rounded-t-[2.5rem] border-t border-white/10 p-8 transform translate-y-full transition-transform duration-300 shadow-[0_-10px_40px_rgba(0,0,0,0.6)]" id="drawer-content">
        <div class="w-12 h-1.5 bg-white/20 rounded-full mx-auto mb-8 cursor-pointer" onclick="toggleMoreMenu()"></div>
        <div class="flex items-center justify-between mb-6 px-2">
            <h3 class="text-[10px] font-black uppercase tracking-[0.2em] text-white/40">More Modules</h3>
            <span class="material-symbols-outlined text-white/20">apps</span>
        </div>
        <div class="grid grid-cols-3 gap-y-6 gap-x-4" id="more-menu-grid">
            <!-- Secondary items injected here -->
        </div>
        <button onclick="toggleMoreMenu()" class="w-full mt-10 py-4 rounded-2xl bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-white/10 transition-all active:scale-95">
            Close Panel
        </button>
    </div>
</div>

<script>
(function() {
    const userRole = '{{ user_role | default("admin") }}';
    const isSeller = userRole === 'seller';
    const prefix = isSeller ? '/seller-admin' : '/admin';
    const currentPage = '{{ active_page | default("vault") }}';
    const pendingCount = parseInt('{{ pending_seller_count or 0 }}') || 0;
    
    let items = [
        { label: 'Vault', icon: 'grid_view', href: prefix, id: 'vault' },
        { label: 'Add Card', icon: 'add_circle', href: prefix + '/add-card', id: 'add-card' },
        { label: 'Upload', icon: 'upload_file', href: prefix + '/bulk-upload', id: 'upload' },
        { label: 'Contact', icon: 'support_agent', href: prefix + '/contact', id: 'contact' },
    ];

    if (!isSeller) {
        items = items.concat([
            { label: 'Audit', icon: 'speed', href: '/admin/audit/pagespeed', id: 'audit' },
            { label: 'Analytics', icon: 'monitoring', href: '/admin/analytics', id: 'analytics' },
            { label: 'Blog', icon: 'article', href: '/admin/blog', id: 'blog' },
            { label: 'Sellers', icon: 'group', href: '/admin/sellers', id: 'sellers', badge: pendingCount },
        ]);
    }
    items.push({ label: 'Settings', icon: 'settings', href: prefix + '/settings', id: 'settings' });

    function render() {
        const nav = document.getElementById('bottom-nav-items');
        const moreGrid = document.getElementById('more-menu-grid');
        if (!nav) return;
        
        nav.innerHTML = '';
        moreGrid.innerHTML = '';

        const isMobile = window.innerWidth < 640;
        const limit = isMobile ? 4 : 20; 
        
        items.forEach((item, index) => {
            if (isMobile && index >= limit) {
                moreGrid.appendChild(createNavItem(item, true));
            } else {
                nav.appendChild(createNavItem(item, false));
            }
        });

        if (isMobile && items.length > limit) {
            nav.appendChild(createMoreButton());
        }
    }

    function createNavItem(item, isDrawer) {
        const isActive = item.id === currentPage;
        const btn = document.createElement('button');
        btn.onclick = () => window.location.href = item.href;
        
        if (isDrawer) {
            btn.className = `flex flex-col items-center gap-3 p-5 rounded-2xl transition-all active:scale-95 ${isActive ? 'bg-primary/10 border border-primary/30 text-primary shadow-[0_0_15px_rgba(37,123,244,0.2)]' : 'bg-white/5 border border-white/5 text-white/60'}`;
        } else {
            btn.className = `flex-1 flex flex-col items-center gap-1.5 min-w-0 h-full justify-center ${isActive ? 'text-primary' : 'text-white/40 hover:text-white'} transition-all group active:scale-95`;
        }
        
        let iconHtml = `<span class="material-symbols-outlined ${isDrawer ? 'text-[30px]' : 'text-[24px]'} group-hover:drop-shadow-[0_0_8px_rgba(${isActive ? '37,123,244' : '255,255,255'},0.6)] transition-all">${item.icon}</span>`;
        
        if (item.badge && item.badge > 0) {
            iconHtml = `<div class="relative">${iconHtml}<span class="absolute -top-1 -right-1 w-4 h-4 rounded-full bg-neon-gold text-black text-[8px] font-black flex items-center justify-center shadow-[0_0_8px_rgba(255,215,0,0.6)] border border-black/20">${item.badge < 10 ? item.badge : '9+'}</span></div>`;
        }
        
        btn.innerHTML = `
            ${iconHtml}
            <span class="${isDrawer ? 'text-[10px] font-black' : 'text-[9px] font-bold'} uppercase tracking-widest truncate w-full text-center">${item.label}</span>
        `;
        return btn;
    }

    function createMoreButton() {
        const secondaryActive = items.slice(4).some(item => item.id === currentPage);
        const btn = document.createElement('button');
        btn.onclick = toggleMoreMenu;
        btn.className = `flex-1 flex flex-col items-center gap-1.5 min-w-0 h-full justify-center ${secondaryActive ? 'text-primary' : 'text-white/40 hover:text-white'} transition-all group active:scale-95`;
        btn.innerHTML = `
            <div class="relative">
                <span class="material-symbols-outlined text-[24px] group-hover:drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]">more_horiz</span>
                ${secondaryActive ? '<span class="absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-primary shadow-[0_0_6px_rgba(37,123,244,0.8)]"></span>' : ''}
            </div>
            <span class="text-[9px] font-bold uppercase tracking-widest">More</span>
        `;
        return btn;
    }

    window.toggleMoreMenu = function() {
        const drawer = document.getElementById('more-menu-drawer');
        const content = document.getElementById('drawer-content');
        if (drawer.classList.contains('hidden')) {
            drawer.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Prevent background scroll
            setTimeout(() => content.classList.remove('translate-y-full'), 10);
        } else {
            content.classList.add('translate-y-full');
            document.body.style.overflow = '';
            setTimeout(() => drawer.classList.add('hidden'), 300);
        }
    };

    render();
    window.addEventListener('resize', render);
})();
</script>
